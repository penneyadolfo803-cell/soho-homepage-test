<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SOHO云知小助手</title>
    <link rel="icon" href="data:," />
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
        }
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --page: #f7f8fb;
        --paper: rgba(255, 255, 255, 0.68);
        --paper-strong: rgba(255, 255, 255, 0.86);
        --line: rgba(72, 84, 106, 0.16);
        --line-strong: rgba(72, 84, 106, 0.26);
        --text: #182033;
        --muted: rgba(24, 32, 51, 0.62);
        --blue: #65c7ff;
        --pink: #ff9aba;
        --mint: #8de6c3;
        --amber: #f5c96b;
        --lavender: #b7adff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 18% 12%, rgba(101, 199, 255, 0.28), transparent 26rem),
          radial-gradient(circle at 86% 24%, rgba(255, 154, 186, 0.22), transparent 24rem),
          radial-gradient(circle at 50% 92%, rgba(141, 230, 195, 0.22), transparent 30rem),
          linear-gradient(180deg, #ffffff 0%, var(--page) 54%, #eef3f8 100%);
        color: var(--text);
        font-family:
          Inter, "SF Pro Display", "PingFang SC", "Microsoft YaHei", system-ui,
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input {
        font: inherit;
      }

      button {
        border: 0;
      }

      #scene {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }

      .soft-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.72), transparent 31%, transparent 78%, rgba(255, 255, 255, 0.48)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.18), transparent 42%, rgba(246, 248, 251, 0.5));
      }

      .glass {
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(255, 255, 255, 0.38)),
          var(--paper);
        box-shadow:
          0 1.3rem 4rem rgba(58, 76, 110, 0.13),
          inset 0 1px 0 rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(1.35rem) saturate(1.22);
        -webkit-backdrop-filter: blur(1.35rem) saturate(1.22);
        border-radius: 8px;
      }

      .topbar {
        position: fixed;
        top: 1rem;
        left: 50%;
        translate: -50% 0;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        min-height: 2.9rem;
        padding: 0.45rem 0.75rem;
        z-index: 5;
        cursor: pointer;
        transition:
          transform 180ms ease,
          background 180ms ease;
      }

      .topbar:hover {
        transform: translateY(-0.08rem);
      }

      .topbar:focus-visible {
        outline: 2px solid rgba(101, 199, 255, 0.72);
        outline-offset: 3px;
      }

      .brand-mark {
        width: 2rem;
        height: 2rem;
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.72);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.82),
          0 0.55rem 1.4rem rgba(44, 62, 90, 0.12);
      }

      .brand-mark img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .brand-copy {
        line-height: 1;
        white-space: nowrap;
      }

      .brand-copy b {
        display: block;
        font-size: 0.94rem;
      }

      .brand-copy span {
        display: block;
        margin-top: 0.25rem;
        color: var(--muted);
        font-size: 0.68rem;
      }

      .hud {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: minmax(16rem, 21rem) 1fr minmax(15rem, 22rem);
        gap: 1rem;
        padding: 1rem;
        pointer-events: none;
      }

      .actions,
      .info {
        pointer-events: auto;
      }

      .actions {
        align-self: center;
        width: min(100%, 20rem);
        padding: 0.75rem;
      }

      .actions.glass {
        border-color: rgba(255, 255, 255, 0.56);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.48), rgba(255, 255, 255, 0.18)),
          rgba(255, 255, 255, 0.18);
        box-shadow:
          0 1.5rem 4.5rem rgba(56, 72, 105, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.9),
          inset 0 -1px 0 rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(1.8rem) saturate(1.55);
        -webkit-backdrop-filter: blur(1.8rem) saturate(1.55);
      }

      .panel-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 2rem;
        padding: 0 0.3rem 0.6rem;
        border-bottom: 1px solid var(--line);
        color: var(--muted);
        font-size: 0.74rem;
      }

      .status-dot {
        width: 0.58rem;
        height: 0.58rem;
        border-radius: 50%;
        background: var(--mint);
        box-shadow: 0 0 1rem rgba(141, 230, 195, 0.88);
      }

      .action-list {
        display: grid;
        gap: 0.45rem;
        margin-top: 0.65rem;
      }

      .action-btn {
        display: grid;
        grid-template-columns: 2.35rem 1fr auto;
        align-items: center;
        gap: 0.65rem;
        width: 100%;
        min-height: 4.1rem;
        padding: 0.58rem;
        border: 1px solid transparent;
        border-radius: 8px;
        color: rgba(24, 32, 51, 0.72);
        background: transparent;
        text-align: left;
        cursor: pointer;
        transition:
          background 130ms ease,
          border-color 130ms ease,
          color 130ms ease,
          transform 150ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      .action-btn:hover,
      .action-btn.is-active {
        color: var(--text);
        background: rgba(255, 255, 255, 0.38);
        border-color: rgba(255, 255, 255, 0.72);
        transform: translateX(0.14rem);
      }

      .action-index {
        display: grid;
        place-items: center;
        width: 2.35rem;
        height: 2.35rem;
        border-radius: 8px;
        background: linear-gradient(180deg, #ffffff, #eff5fb);
        color: var(--text);
        box-shadow: inset 0 0 0 1px rgba(72, 84, 106, 0.12);
        font-size: 0.78rem;
      }

      .action-copy {
        min-width: 0;
      }

      .action-copy strong,
      .action-copy span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .action-copy strong {
        font-size: 0.95rem;
        font-weight: 720;
      }

      .action-copy span {
        margin-top: 0.3rem;
        color: var(--muted);
        font-size: 0.74rem;
      }

      .action-arrow {
        width: 1.6rem;
        height: 1.6rem;
        display: grid;
        place-items: center;
        border-radius: 50%;
        border: 1px solid var(--line);
        color: var(--muted);
      }

      .hero-copy {
        align-self: end;
        max-width: 38rem;
        margin: 0 0 2.1rem 1.5rem;
        pointer-events: none;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        min-height: 2rem;
        padding: 0.32rem 0.68rem;
        color: rgba(24, 32, 51, 0.74);
        font-size: 0.78rem;
      }

      .eyebrow::before {
        content: "";
        width: 0.55rem;
        height: 0.55rem;
        border-radius: 50%;
        background: var(--blue);
        box-shadow: 0 0 1rem rgba(101, 199, 255, 0.8);
      }

      h1 {
        max-width: 34rem;
        margin: 0.86rem 0 0;
        font-size: clamp(2.35rem, 5vw, 5.05rem);
        line-height: 0.98;
        font-weight: 760;
        letter-spacing: 0;
      }

      .hero-copy p {
        max-width: 30rem;
        margin: 0.9rem 0 0;
        color: rgba(24, 32, 51, 0.66);
        font-size: 1rem;
        line-height: 1.75;
      }

      .info {
        align-self: end;
        justify-self: end;
        width: min(100%, 21rem);
        margin-bottom: 1.1rem;
        padding: 0.9rem;
      }

      .info-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .info h2 {
        margin: 0;
        font-size: 1rem;
      }

      .chip {
        min-width: 3.2rem;
        padding: 0.28rem 0.5rem;
        border-radius: 999px;
        color: #fff;
        background: var(--blue);
        text-align: center;
        font-size: 0.68rem;
        font-weight: 760;
      }

      .info p {
        display: none;
        margin: 0.72rem 0 0;
        color: rgba(24, 32, 51, 0.62);
        font-size: 0.86rem;
        line-height: 1.7;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.45rem;
        margin-top: 0.85rem;
      }

      .stat {
        min-width: 0;
        padding: 0.55rem 0.45rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.58);
      }

      .stat b {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 1rem;
      }

      .stat span {
        display: none;
        margin-top: 0.22rem;
        color: rgba(24, 32, 51, 0.48);
        font-size: 0.66rem;
      }

      .intro {
        position: fixed;
        inset: 0;
        z-index: 30;
        background: #f7f8fb;
        transition:
          opacity 900ms ease,
          visibility 900ms ease;
      }

      .intro.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .intro-card {
        position: absolute;
        inset: 0;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: #f7f8fb;
      }

      .intro-video {
        position: absolute;
        inset: 0;
        overflow: hidden;
        min-height: 100%;
        border-radius: 0;
        background: #eef4fb;
      }

      .intro-video video {
        width: 100%;
        height: 100%;
        min-height: 100%;
        object-fit: cover;
        display: block;
      }

      .intro-video::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.22), transparent 48%),
          linear-gradient(180deg, transparent 50%, rgba(255, 255, 255, 0.32));
        pointer-events: none;
      }

      .intro-copy {
        position: absolute;
        left: clamp(1rem, 5vw, 4rem);
        bottom: clamp(1rem, 6vh, 4rem);
        width: min(28rem, calc(100vw - 2rem));
        padding: clamp(1rem, 2vw, 1.35rem);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.5);
        backdrop-filter: blur(1.1rem) saturate(1.2);
        -webkit-backdrop-filter: blur(1.1rem) saturate(1.2);
      }

      .intro-copy .small {
        color: #4a9ed0;
        font-size: 0.78rem;
        font-weight: 760;
      }

      .intro-copy h2 {
        margin: 0.9rem 0 0;
        font-size: clamp(2rem, 4vw, 4.25rem);
        line-height: 1.02;
      }

      .intro-copy p {
        display: none;
      }

      .intro-progress {
        width: 100%;
        height: 0.35rem;
        margin-top: 1.6rem;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(72, 84, 106, 0.12);
      }

      .intro-progress i {
        display: block;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, var(--blue), var(--pink), var(--mint));
        transform-origin: left;
        animation: intro-progress 5.2s linear forwards;
        animation-play-state: paused;
      }

      .intro.is-playing .intro-progress i {
        animation-play-state: running;
      }

      @keyframes intro-progress {
        from {
          transform: scaleX(0);
        }
        to {
          transform: scaleX(1);
        }
      }

      .skip-intro {
        margin-top: 1rem;
        min-height: 2.35rem;
        padding: 0 0.85rem;
        border-radius: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        cursor: pointer;
      }

      .modal-layer,
      .contact-film {
        position: fixed;
        inset: 0;
        z-index: 40;
        background: #f7f8fb;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 220ms ease,
          visibility 220ms ease;
      }

      .modal-layer {
        display: grid;
        place-items: center;
        padding: 1rem;
        background: rgba(247, 248, 251, 0.94);
        backdrop-filter: blur(0.9rem) saturate(1.08);
        -webkit-backdrop-filter: blur(0.9rem) saturate(1.08);
      }

      .modal-layer.is-open,
      .contact-film.is-open {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .modal {
        width: min(92vw, 34rem);
        max-height: 86vh;
        padding: 1rem;
        transform: translateY(0.8rem) scale(0.98);
        opacity: 0;
        overflow: hidden;
        transition:
          transform 260ms ease,
          opacity 260ms ease;
      }

      .modal.is-tutorial {
        width: min(94vw, 72rem);
        padding: 0.9rem;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(250, 253, 255, 0.94)),
          #ffffff;
        box-shadow:
          0 1.5rem 5rem rgba(58, 76, 110, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.96);
      }

      .modal-layer.is-open .modal {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--line);
      }

      .modal-head h3 {
        margin: 0;
        font-size: 1.15rem;
      }

      .close-btn {
        width: 2.2rem;
        height: 2.2rem;
        display: grid;
        place-items: center;
        border-radius: 8px;
        color: var(--text);
        background: rgba(72, 84, 106, 0.08);
        cursor: pointer;
      }

      .qr-wrap {
        display: grid;
        place-items: center;
        padding: 1.2rem 0 0.8rem;
      }

      .qr-shell {
        width: min(70vw, 17rem);
        padding: 0.75rem;
        border-radius: 8px;
        background: #fff;
        border: 1px solid var(--line);
      }

      .qr-shell img {
        display: block;
        width: 100%;
        height: auto;
      }

      .modal p,
      .tutorial-body {
        color: rgba(24, 32, 51, 0.66);
        line-height: 1.75;
      }

      .tutorial-body {
        max-height: min(48vh, 22rem);
        overflow: auto;
        padding: 0.9rem 0.2rem 0 0;
        white-space: pre-wrap;
      }

      .tutorial-shell {
        display: grid;
        grid-template-columns: minmax(12rem, 16rem) 1fr;
        gap: 0.8rem;
        min-height: min(64vh, 38rem);
        padding-top: 0.85rem;
      }

      .tutorial-nav {
        display: grid;
        align-content: start;
        gap: 0.35rem;
        max-height: min(64vh, 38rem);
        overflow: auto;
        padding-right: 0.25rem;
      }

      .tutorial-nav button {
        display: grid;
        grid-template-columns: 2rem 1fr;
        align-items: center;
        gap: 0.55rem;
        min-height: 2.55rem;
        padding: 0.35rem 0.45rem;
        border: 1px solid transparent;
        border-radius: 8px;
        color: rgba(24, 32, 51, 0.66);
        background: rgba(255, 255, 255, 0.3);
        cursor: pointer;
        text-align: left;
      }

      .tutorial-nav button.is-active {
        color: var(--text);
        background: rgba(255, 255, 255, 0.72);
        border-color: rgba(101, 199, 255, 0.36);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.68);
      }

      .tutorial-nav b {
        display: grid;
        place-items: center;
        width: 2rem;
        height: 2rem;
        border-radius: 8px;
        background: linear-gradient(180deg, #ffffff, #eef7fb);
        font-size: 0.75rem;
      }

      .tutorial-nav span {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.82rem;
        font-weight: 680;
      }

      .tutorial-panel {
        max-height: min(64vh, 38rem);
        overflow: auto;
        border: 1px solid rgba(72, 84, 106, 0.12);
        border-radius: 8px;
        background:
          linear-gradient(180deg, #ffffff, #f8fbfd),
          #ffffff;
      }

      .tutorial-hero {
        position: sticky;
        top: 0;
        z-index: 1;
        padding: 1.1rem;
        border-bottom: 1px solid rgba(72, 84, 106, 0.12);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(1rem) saturate(1.18);
        -webkit-backdrop-filter: blur(1rem) saturate(1.18);
      }

      .tutorial-hero small {
        display: block;
        color: #4aa8dd;
        font-weight: 760;
      }

      .tutorial-hero h4 {
        margin: 0.45rem 0 0;
        font-size: clamp(1.35rem, 2.3vw, 2rem);
        line-height: 1.18;
      }

      .tutorial-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-top: 0.8rem;
      }

      .tutorial-meta span {
        padding: 0.3rem 0.55rem;
        border-radius: 999px;
        color: rgba(24, 32, 51, 0.68);
        background: rgba(101, 199, 255, 0.12);
        font-size: 0.74rem;
      }

      .tutorial-content {
        padding: 1.1rem;
        color: rgba(24, 32, 51, 0.82);
        font-size: 0.95rem;
        line-height: 1.82;
        white-space: pre-wrap;
      }

      .email-box {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.55rem;
        margin-top: 1rem;
      }

      .email-box input {
        min-width: 0;
        height: 3rem;
        padding: 0 0.85rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.72);
      }

      .copy-btn {
        height: 3rem;
        padding: 0 0.9rem;
        border-radius: 8px;
        color: #fff;
        background: #4aa8dd;
        cursor: pointer;
        font-weight: 760;
      }

      .film-stage {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: #f7f8fb;
      }

      .contact-video {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 0;
      }

      .contact-email-final {
        position: absolute;
        left: 50%;
        top: 50%;
        width: min(42rem, 54vw);
        min-height: clamp(3.2rem, 7.8vw, 5.1rem);
        display: grid;
        place-items: center;
        padding: 0.75rem 1.4rem;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 8px;
        color: #111827;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.38)),
          rgba(255, 255, 255, 0.48);
        box-shadow:
          0 1.2rem 3rem rgba(23, 36, 60, 0.14),
          inset 0 1px 0 rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(1rem) saturate(1.2);
        -webkit-backdrop-filter: blur(1rem) saturate(1.2);
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, calc(-50% + 0.8rem)) scale(0.98);
        transition:
          opacity 360ms ease,
          transform 360ms ease;
        font-size: clamp(1.15rem, 2.8vw, 2.45rem);
        font-weight: 760;
        letter-spacing: 0;
        white-space: nowrap;
      }

      .contact-film.is-complete .contact-email-final {
        opacity: 1;
        pointer-events: auto;
        transform: translate(-50%, -50%) scale(1);
      }

      .film-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 2.4rem;
        height: 2.4rem;
        display: grid;
        place-items: center;
        border-radius: 8px;
        color: var(--text);
        background: rgba(255, 255, 255, 0.58);
        border: 1px solid rgba(255, 255, 255, 0.72);
        box-shadow: 0 0.8rem 2rem rgba(23, 36, 60, 0.12);
        cursor: pointer;
      }

      .scene-nav {
        position: fixed;
        inset: 0;
        z-index: 8;
        pointer-events: none;
      }

      .scene-step {
        position: absolute;
        top: 50%;
        width: clamp(2.8rem, 4vw, 3.55rem);
        height: clamp(2.8rem, 4vw, 3.55rem);
        display: grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.72);
        border-radius: 8px;
        color: rgba(24, 32, 51, 0.78);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.3)),
          rgba(255, 255, 255, 0.42);
        box-shadow:
          0 1rem 2.8rem rgba(58, 76, 110, 0.13),
          inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(1.2rem) saturate(1.3);
        -webkit-backdrop-filter: blur(1.2rem) saturate(1.3);
        cursor: pointer;
        pointer-events: auto;
        transform: translateY(-50%);
        transition:
          transform 180ms ease,
          background 130ms ease,
          color 180ms ease;
        font-size: clamp(1.6rem, 2.7vw, 2.15rem);
        line-height: 1;
      }

      .scene-step:hover {
        color: var(--text);
        background:

            if (inStreetX || inStreetZ) continue;

            const skipNoise = seededNoise(gx * 109 + gz * 53 + 7);
            if (skipNoise < 0.12) continue;

            const parcelX = Math.floor((x + citySize / 2) / 3.2);
            const parcelZ = Math.floor((z + citySize / 2) / 3.2);
            const parcelMood = seededNoise(parcelX * 151 + parcelZ * 59 + 31);
            const heightNoise = seededNoise(gx * 73 + gz * 41 + 19);
            const spike = heightNoise > 0.86 ? 5 + Math.floor(seededNoise(gx * 17 + gz * 97) * 6) : 0;
            const lowPocket = parcelMood < 0.26 && heightNoise < 0.55 ? -2 : 0;
            const centerFalloff = Math.max(0, 1 - Math.hypot(x / 9, z / 9));
            const height = Math.max(1, Math.floor(2 + parcelMood * 8 + centerFalloff * 5 + heightNoise * 5 + spike + lowPocket));

            for (let level = 0; level < height; level++) {
              const mesh = new THREE.Mesh(roundedGeo, cubeMaterial(count));
              mesh.scale.setScalar(cubeSize);
              const edge = new THREE.LineSegments(edgeGeo, edgeMat);
              edge.scale.setScalar(1.012);
              mesh.add(edge);
              mesh.position.set(
                x + (seededNoise(count + 21) - 0.5) * 0.045,
                cubeSize / 2 + level * (cubeSize + 0.018),
                z + (seededNoise(count + 31) - 0.5) * 0.045,
              );
              mesh.rotation.y = (seededNoise(count + 45) - 0.5) * 0.08;
              mesh.rotation.z = (seededNoise(count + 58) - 0.5) * 0.02;
              mesh.userData.baseY = mesh.position.y;
              mesh.userData.float = 0.16 + seededNoise(count + 77) * 0.28;
              world.add(mesh);
              count++;
            }
          }
        }

        actions.forEach((action, index) => {
          const mesh = new THREE.Mesh(specialGeo, cubeMaterial(index, true, action.accent));
          mesh.position.copy(action.block);
          mesh.scale.setScalar(0.9);
          const edge = new THREE.LineSegments(new THREE.EdgesGeometry(specialGeo), specialEdgeMat.clone());
          edge.material.color.setHex(action.accent);
          edge.scale.setScalar(1.018);
          mesh.add(edge);
          mesh.userData.baseY = mesh.position.y;
          mesh.userData.float = 0.48 + index * 0.1;
          mesh.userData.actionIndex = index;
          interactive.push(mesh);
          specialMeshes.set(action.id, mesh);
          world.add(mesh);

          const halo = new THREE.Mesh(
            new THREE.TorusGeometry(1.18, 0.025, 10, 80),
            new THREE.MeshBasicMaterial({
              color: action.accent,
              transparent: true,
              opacity: 0.38,
              depthWrite: false,
            }),
          );
          halo.position.set(action.block.x, action.block.y - 0.5, action.block.z);
          halo.rotation.x = Math.PI / 2;
          halo.userData.spin = 0.2 + index * 0.04;
          world.add(halo);

          const glow = new THREE.PointLight(action.accent, 0.8, 4.2, 1.65);
          glow.position.copy(mesh.position);
          glow.userData.actionId = action.id;
          specialLights.set(action.id, glow);
          world.add(glow);

          const glowShell = new THREE.Mesh(
            new RoundedBoxGeometry(1.22, 1.22, 1.22, 6, 0.2),
            new THREE.MeshBasicMaterial({
              color: action.accent,
              transparent: true,
              opacity: 0.04,
              blending: THREE.AdditiveBlending,
              depthWrite: false,
              depthTest: true,
            }),
          );
          glowShell.position.copy(mesh.position);
          glowShell.userData.actionId = action.id;
          specialGlowShells.set(action.id, glowShell);
          world.add(glowShell);

          const label = new THREE.Mesh(
            new THREE.PlaneGeometry(1.65, 0.62),
            new THREE.MeshBasicMaterial({
              map: labelTexture(action.label, action.accent),
              transparent: true,
              opacity: 0.88,
              depthWrite: false,
              depthTest: false,
              side: THREE.DoubleSide,
            }),
          );
          label.position.set(action.block.x, action.block.y + 0.92, action.block.z + 0.15);
          label.userData.billboard = true;
          labels.push(label);
          world.add(label);
        });

        window.__YUNZHI_DEBUG__ = {
          normalCubeCount: count,
          specialCubeCount: actions.length,
          cubeShape: "all cubes use equal x/y/z scale",
          layout: "feature cubes aligned to boulevard intersections",
        };
      }

      function makeCameraRoute(from, to) {
        const y = from.y;
        const z = from.z;
        return new THREE.CatmullRomCurve3(
          [
            new THREE.Vector3(from.x, y, z),
            new THREE.Vector3(THREE.MathUtils.lerp(from.x, to.x, 0.34), y, z),
            new THREE.Vector3(THREE.MathUtils.lerp(from.x, to.x, 0.66), y, z),
            new THREE.Vector3(to.x, y, z),
          ],
          false,
          "catmullrom",
          0.08,
        );
      }

      function makeLookRoute(from, to) {
        const y = from.y;
        const z = from.z;
        return new THREE.CatmullRomCurve3(
          [
            new THREE.Vector3(from.x, y, z),
            new THREE.Vector3(THREE.MathUtils.lerp(from.x, to.x, 0.34), y, z),
            new THREE.Vector3(THREE.MathUtils.lerp(from.x, to.x, 0.66), y, z),
            new THREE.Vector3(to.x, y, z),
          ],
          false,
          "catmullrom",
          0.08,
        );
      }

      function smoothstep(value) {
        return value * value * (3 - 2 * value);
      }

      function makeButtons() {
        actions.forEach((action, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "action-btn";
          button.innerHTML = `
            <span class="action-index">0${index + 1}</span>
            <span class="action-copy">
              <strong>${action.label}</strong>
              <span>${action.sub}</span>
            </span>
            <span class="action-arrow" aria-hidden="true">›</span>
          `;
          button.addEventListener("pointerenter", () => {
            if (!sceneLocked()) setActive(index);
          });
          button.addEventListener("click", () => triggerAction(index));
          ui.actionList.appendChild(button);
        });
      }

      function setActive(index, instant = false) {
        const action = actions[index];
        if (!action) return;
        if (index === activeIndex && !instant) return;
        const fromCamera = cameraBase.clone();
        const fromLook = lookBase.clone();
        activeIndex = index;
        cameraTarget.copy(action.camera);
        lookTarget.copy(action.look);
        if (instant) {
          cameraBase.copy(action.camera);
          lookBase.copy(action.look);
          camera.position.copy(cameraBase);
          currentLook.copy(lookBase);
          routeProgress = 1;
        } else {
          cameraRoute = makeCameraRoute(fromCamera, action.camera);
          lookRoute = makeLookRoute(fromLook, action.look);
          routeProgress = 0;
        }
        ui.eyebrow.textContent = action.eyebrow;
        ui.headline.textContent = action.headline;
        ui.lead.textContent = action.lead;
        ui.infoTitle.textContent = action.label;
        ui.infoChip.textContent = action.chip;
        ui.infoBody.textContent = action.body;
        ui.statA.textContent = action.stat[0];
        ui.statB.textContent = action.stat[1];
        ui.statC.textContent = action.stat[2];
        ui.infoChip.style.background = `#${action.accent.toString(16).padStart(6, "0")}`;
        [...ui.actionList.children].forEach((item, i) => item.classList.toggle("is-active", i === index));
      }

      function triggerAction(index) {
        setActive(index);
        const action = actions[index];
        if (action.id === "test") openTestModal();
        if (action.id === "tutorial") openTutorialModal();
        if (action.id === "contact") runContactFilm();
        if (action.id === "soon") openSoonModal();
      }

      function stepScene(direction) {
        if (sceneLocked()) return;
        const nextIndex = (activeIndex + direction + actions.length) % actions.length;
        setActive(nextIndex);
      }

      function sceneLocked() {
        return ui.modalLayer.classList.contains("is-open") || ui.contactFilm.classList.contains("is-open");
      }

      function openTestModal() {
        ui.modalTitle.textContent = "参加测试";
        ui.modalBody.innerHTML = `
          <div class="qr-wrap">
            <div class="qr-shell"><img src="${CONFIG.qrImage}" alt="测试入口二维码" /></div>
          </div>
          <p>扫码参与 SOHO云知小助手体验测试。</p>
        `;
        openModal();
      }

      function openTutorialModal() {
        ui.modalTitle.textContent = CONFIG.tutorialTitle;
        ui.modalBody.innerHTML = `<div class="tutorial-body">教程正在加载。</div>`;
        openModal();
        ui.modalLayer.querySelector(".modal").classList.add("is-tutorial");
        loadTutorial().then(renderTutorial).catch(() => {
          ui.modalBody.innerHTML = `<div class="tutorial-body">${escapeHtml(CONFIG.tutorialText)}</div>`;
        });
      }

      async function loadTutorial() {
        if (CONFIG.tutorialData) return CONFIG.tutorialData;
        const response = await fetch(CONFIG.tutorialJson);
        CONFIG.tutorialData = await response.json();
        return CONFIG.tutorialData;
      }

      function renderTutorial(data) {
        const sections = data.sections || [];
        const first = sections[0];
        ui.modalBody.innerHTML = `
          <div class="tutorial-shell">
            <nav class="tutorial-nav" aria-label="教程章节">
              ${sections
                .map(
                  (section, index) => `
                    <button type="button" class="${index === 0 ? "is-active" : ""}" data-section="${index}">
                      <b>${String(section.number).padStart(2, "0")}</b>
                      <span>${escapeHtml(section.title)}</span>
                    </button>
                  `,
                )
                .join("")}
            </nav>
            <article class="tutorial-panel">
              <div class="tutorial-hero">
                <small>SOHO FASHION GUIDE</small>
                <h4 id="tutorialSectionTitle">${first ? `${first.number}. ${escapeHtml(first.title)}` : escapeHtml(data.title)}</h4>
                <div class="tutorial-meta">
                  ${(data.meta || []).map((item) => `<span>${escapeHtml(item)}</span>`).join("")}
                </div>
              </div>
              <div class="tutorial-content" id="tutorialSectionBody">${first ? escapeHtml(first.body) : ""}</div>
            </article>
          </div>
        `;
        const title = ui.modalBody.querySelector("#tutorialSectionTitle");
        const body = ui.modalBody.querySelector("#tutorialSectionBody");
        const buttons = [...ui.modalBody.querySelectorAll(".tutorial-nav button")];
        buttons.forEach((button) => {
          button.addEventListener("click", () => {
            const section = sections[Number(button.dataset.section)];
            if (!section) return;
            buttons.forEach((item) => item.classList.toggle("is-active", item === button));
            title.textContent = `${section.number}. ${section.title}`;
            body.textContent = section.body;
          });
        });
      }

      async function warmVideo(video, source) {
        const src = source || video.dataset.source || video.getAttribute("src") || video.currentSrc || video.src;
        if (!src) return;

        const waitForReady = () => new Promise((resolve, reject) => {
          const cleanup = () => {
            video.removeEventListener("canplay", onReady);
            video.removeEventListener("canplaythrough", onReady);
            video.removeEventListener("loadeddata", onReady);
            video.removeEventListener("error", onError);
            window.clearTimeout(timer);
          };
          const onReady = () => {
            cleanup();
            resolve();
          };
          const onError = () => {
            cleanup();
            reject(new Error("Video decode failed"));
          };
          const timer = window.setTimeout(onReady, 2500);

          video.addEventListener("canplay", onReady, { once: true });
          video.addEventListener("canplaythrough", onReady, { once: true });
          video.addEventListener("loadeddata", onReady, { once: true });
          video.addEventListener("error", onError, { once: true });
          if (video.readyState >= 2) onReady();
        });

        let parsedUrl = null;
        try {
          parsedUrl = new URL(src, window.location.href);
        } catch (error) {
          parsedUrl = null;
        }

        if (parsedUrl && parsedUrl.origin !== window.location.origin) {
          if (video.src !== src) {
            video.dataset.blobSource = "";
            video.src = src;
            video.load();
          }
          await waitForReady();
          return;
        }

        if (video.dataset.blobSource === src && video.src.startsWith("blob:")) {
          await waitForReady();
          return;
        }

        let objectUrl = videoBlobCache.get(src);
        if (!objectUrl) {
          const response = await fetch(src, { cache: "force-cache" });
          if (!response.ok) throw new Error(`Video load failed: ${response.status}`);
          const blob = await response.blob();
          objectUrl = URL.createObjectURL(blob);
          videoBlobCache.set(src, objectUrl);
        }

        video.dataset.blobSource = src;
        video.src = objectUrl;
        video.load();
        await waitForReady();
      }

      async function runContactFilm() {
        closeModal();
        window.clearTimeout(contactFilmTimer);
        ui.contactFilm.classList.add("is-open");
        ui.contactFilm.classList.remove("is-complete");
        ui.contactFilm.setAttribute("aria-hidden", "false");
        ui.contactEmailFinal.textContent = CONFIG.email;

        const video = ui.contactVideo;
        let finished = false;
        const finish = () => {
          if (finished) return;
          finished = true;
          window.clearTimeout(contactFilmTimer);
          video.pause();
          ui.contactFilm.classList.add("is-complete");
        };

        video.pause();
        if (video.src !== CONFIG.contactVideo) {
          video.src = CONFIG.contactVideo;
        }
        video.load();
        video.currentTime = 0;
        video.addEventListener("ended", finish, { once: true });
        video.play().catch(finish);
        const fallbackMs = Number.isFinite(video.duration) && video.duration > 0
          ? Math.min(video.duration * 1000 + 1000, 10000)
          : 7000;
        contactFilmTimer = window.setTimeout(finish, fallbackMs);
      }

      function closeContactFilm() {
        window.clearTimeout(contactFilmTimer);
        ui.contactVideo.pause();
        ui.contactFilm.classList.remove("is-open", "is-complete");
        ui.contactFilm.setAttribute("aria-hidden", "true");
      }

      function openContactModal() {
        ui.modalTitle.textContent = "联系我们";
        ui.modalBody.innerHTML = `
          <p>请通过下面的邮箱联系 SOHO FASHION 开发团队。</p>
          <div class="email-box">
            <input value="${CONFIG.email}" readonly aria-label="联系邮箱" />
            <button class="copy-btn" type="button" id="copyEmail">复制</button>
          </div>
        `;
        openModal();
        document.querySelector("#copyEmail").addEventListener("click", async () => {
          await navigator.clipboard?.writeText(CONFIG.email).catch(() => {});
          document.querySelector("#copyEmail").textContent = "已复制";
        });
      }

      function openSoonModal() {
        ui.modalTitle.textContent = "敬请期待";
        ui.modalBody.innerHTML = `<p>更多面向服装设计流程的智能能力即将开放。</p>`;
        openModal();
      }

      function openModal() {
        ui.modalLayer.classList.add("is-open");
        ui.modalLayer.setAttribute("aria-hidden", "false");
      }

      function closeModal() {
        ui.modalLayer.classList.remove("is-open");
        ui.modalLayer.setAttribute("aria-hidden", "true");
        ui.modalLayer.querySelector(".modal").classList.remove("is-tutorial");
      }

      function refreshPage() {
        window.location.reload();
      }

      async function setupIntro() {
        return new Promise(async (resolve) => {
          let finished = false;
          const finishIntro = () => {
            if (finished) return;
            finished = true;
            ui.introVideo.pause();
            ui.intro.classList.remove("is-playing");
            ui.intro.classList.add("is-hidden");
            resolve();
          };

          ui.skipIntro.addEventListener("click", finishIntro);
          ui.intro.classList.remove("is-playing");
          ui.introVideo.pause();
          if (ui.introVideo.src !== CONFIG.introVideo) {
            ui.introVideo.src = CONFIG.introVideo;
          }
          ui.introVideo.load();
          if (finished) return;
          ui.introVideo.currentTime = 0;
          ui.introVideo.addEventListener("ended", finishIntro, { once: true });
          ui.introVideo.addEventListener("error", () => {
            ui.skipIntro.textContent = "进入主页";
          }, { once: true });
          ui.introVideo.play().then(() => {
            if (!finished) ui.intro.classList.add("is-playing");
          }).catch(() => {
            ui.skipIntro.textContent = "点击进入主页";
          });
        });
      }

      function resize() {
        const width = window.innerWidth;
        const height = window.innerHeight;
        camera.aspect = width / height;
        camera.updateProjectionMatrix();
        renderer.setSize(width, height, false);
      }

      function onPointerMove(event) {
        const x = event.clientX / window.innerWidth;
        const y = event.clientY / window.innerHeight;
        pointer.set(x * 2 - 1, -(y * 2 - 1));
        mouse.set(x - 0.5, y - 0.5);
        ui.cursorRing.style.transform = `translate(${event.clientX}px, ${event.clientY}px)`;
      }

      function onPointerDown(event) {
        if (event.target !== canvas) return;
        triggerAction(hoverIndex >= 0 ? hoverIndex : activeIndex);
      }

      function animate() {
        const dt = Math.min(clock.getDelta(), 0.04);
        const t = clock.elapsedTime;

        raycaster.setFromCamera(pointer, camera);
        const hit = raycaster.intersectObjects(interactive, false)[0];
        hoverIndex = hit ? hit.object.userData.actionIndex : -1;
        document.body.classList.toggle("is-pointing", hoverIndex >= 0);

        world.position.lerp(temp.set(-mouse.x * 0.12, 0, 0), 1 - Math.pow(0.004, dt));
        world.rotation.y += (mouse.x * 0.035 - world.rotation.y) * (1 - Math.pow(0.006, dt));
        world.rotation.x += (0 - world.rotation.x) * (1 - Math.pow(0.006, dt));

        if (cameraRoute && lookRoute && routeProgress < 1) {
          routeProgress = Math.min(1, routeProgress + dt * 0.95);
          const eased = smoothstep(routeProgress);
          cameraBase.copy(cameraRoute.getPoint(eased));
          lookBase.copy(lookRoute.getPoint(eased));
        } else {
          cameraBase.lerp(cameraTarget, 1 - Math.pow(0.00055, dt));
          lookBase.lerp(lookTarget, 1 - Math.pow(0.00055, dt));
        }

        camera.position.copy(cameraBase).add(temp2.set(mouse.x * 0.08, 0, 0));
        currentLook.copy(lookBase).add(temp.set(mouse.x * 0.05, 0, 0));
        camera.lookAt(currentLook);

        world.traverse((obj) => {
          if (!obj.isMesh) return;
          if (obj.userData.baseY !== undefined) {
            obj.position.y = obj.userData.baseY + Math.sin(t * obj.userData.float + obj.id) * 0.018;
          }
          if (obj.userData.billboard) {
            obj.quaternion.copy(camera.quaternion);
          }
          if (obj.userData.spin) {
            obj.rotation.z += obj.userData.spin * dt;
          }
        });

        actions.forEach((action, index) => {
          const mesh = specialMeshes.get(action.id);
          const glow = specialLights.get(action.id);
          const glowShell = specialGlowShells.get(action.id);
          const isActive = index === activeIndex;
          mesh.scale.lerp(temp.setScalar(isActive ? 1.18 : 1.04), 1 - Math.pow(0.0012, dt));
          mesh.material.emissive.setHex(action.accent);
          mesh.material.emissiveIntensity += ((isActive ? 1.35 : 0.36) - mesh.material.emissiveIntensity) * (1 - Math.pow(0.004, dt));
          mesh.material.opacity += ((isActive ? 0.9 : 0.62) - mesh.material.opacity) * (1 - Math.pow(0.004, dt));
          mesh.rotation.y += (isActive ? 0.22 : 0.05) * dt;
          if (glow) {
            glow.position.copy(mesh.position);
            glow.intensity += ((isActive ? 6.2 : 1.1) - glow.intensity) * (1 - Math.pow(0.004, dt));
          }
          if (glowShell) {
            glowShell.position.copy(mesh.position);
            glowShell.rotation.copy(mesh.rotation);
            glowShell.scale.lerp(temp.setScalar(isActive ? 1.42 : 1.1), 1 - Math.pow(0.0012, dt));
            glowShell.material.opacity += ((isActive ? 0.16 : 0.035) - glowShell.material.opacity) * (1 - Math.pow(0.004, dt));
          }
        });

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
      }

      function roundRect(ctx, x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
      }

      function seededNoise(n) {
        const x = Math.sin(n * 12.9898) * 43758.5453;
        return x - Math.floor(x);
      }

      function escapeHtml(value) {
        return value
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      ui.closeModal.addEventListener("click", closeModal);
      ui.closeContactFilm.addEventListener("click", closeContactFilm);
      ui.prevScene.addEventListener("click", () => stepScene(-1));
      ui.nextScene.addEventListener("click", () => stepScene(1));
      document.querySelector("#homeRefresh").addEventListener("click", refreshPage);
      document.querySelector("#homeRefresh").addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          refreshPage();
        }
      });
      ui.modalLayer.addEventListener("click", (event) => {
        if (event.target === ui.modalLayer) closeModal();
      });
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeModal();
          closeContactFilm();
        }
        if (event.key === "ArrowLeft") stepScene(-1);
        if (event.key === "ArrowRight") stepScene(1);
      });
      window.addEventListener("resize", resize);
      window.addEventListener("pointermove", onPointerMove);
      window.addEventListener("pointerdown", onPointerDown);
      window.addEventListener("pointerleave", () => {
        pointer.set(99, 99);
        document.body.classList.remove("is-pointing");
      });

      async function startApp() {
        if (started) return;
        started = true;
        resize();
        buildStackedWorld();
        makeButtons();
        setActive(0, true);
        requestAnimationFrame(animate);
        await setupIntro();
      }

      startApp();
    </script>
  </body>
